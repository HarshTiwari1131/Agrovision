name: Sync to Hugging Face

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://huggingface.co/spaces/HarshTiwari1131/Agrovision_geeta || true
          git push -f https://HarshTiwari1131:${HF_TOKEN}@huggingface.co/spaces/HarshTiwari1131/Agrovision_geeta main
